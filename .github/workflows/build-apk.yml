name: بناء APK تلقائياً

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: بناء APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: إعداد Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: تثبيت Android SDK 35
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" || true

      - name: تثبيت المكتبات
        run: |
          cd flutter_inventory
          flutter pub get

      - name: توليد كود قاعدة البيانات
        run: |
          cd flutter_inventory
          dart run build_runner build --delete-conflicting-outputs

      - name: بناء APK
        run: |
          cd flutter_inventory
          flutter build apk --release

      - name: رفع APK للتنزيل
        uses: actions/upload-artifact@v4
        with:
          name: مخزوني-APK
          path: flutter_inventory/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: عرض رابط التنزيل
        run: |
          echo "✅ تم بناء APK بنجاح!"
          echo "📱 اذهب إلى: Actions → أحدث تشغيل → Artifacts → مخزوني-APK"
          echo "📥 اضغط على الملف لتنزيل APK"
