name: flutter_inventory
description: تطبيق أرشفة وإدارة المخزون - نظام متكامل للعمل بدون إنترنت
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  badges: ^3.1.2

  # Image handling
  image_picker: ^1.1.2
  image: ^4.1.7
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Export
  excel: ^4.0.2
  share_plus: ^9.0.0

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path: ^1.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
