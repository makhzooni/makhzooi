name: flutter_inventory
description: تطبيق أرشفة وإدارة المخزون - نظام متكامل للعمل بدون إنترنت
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3

  # Navigation
  go_router: ^14.2.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2

  # Image handling
  image_picker: ^1.1.2
  image: ^4.1.7
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Export
  excel: ^4.0.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path: ^1.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.5

  # HTTP / AI Search
  http: ^1.2.1
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
